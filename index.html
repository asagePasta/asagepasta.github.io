<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hayakawa Dev</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Hiragino Sans", "Meiryo", sans-serif;
           background: #f5f0e1; color: #333; }
    header { background: #2a4a3a; color: #fff; padding: 60px 20px; text-align: center; }
    header h1 { font-size: 2.4em; color: #d4af74; }
    header p  { margin-top: 10px; font-size: 1.1em; color: #ccc; }
    main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h2 { color: #2a4a3a; border-bottom: 2px solid #d4af74; padding-bottom: 8px; margin: 40px 0 20px; }
    .about { background: #fff; border-radius: 12px; padding: 24px;
             box-shadow: 0 2px 8px rgba(0,0,0,0.08); line-height: 1.8; color: #555; }
    .about p + p { margin-top: 12px; }
    .app-card { background: #fff; border-radius: 12px; padding: 24px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
    .app-card h3 { color: #2a4a3a; font-size: 1.3em; }
    .app-card p  { margin-top: 8px; color: #555; line-height: 1.7; }
    .app-card a  { display: inline-block; margin-top: 12px; color: #2a4a3a;
                   text-decoration: none; font-weight: bold; border-bottom: 1px solid #d4af74; }
    .contact-form { background: #fff; border-radius: 12px; padding: 24px;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .contact-form input,
    .contact-form textarea {
      width: 100%; padding: 10px 12px; margin-top: 8px; margin-bottom: 16px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 1em;
      font-family: inherit; background: #fafafa;
    }
    .contact-form textarea { height: 140px; resize: vertical; }
    .contact-form label { color: #555; font-size: 0.95em; }
    .contact-form button {
      background: #2a4a3a; color: #fff; border: none; padding: 12px 28px;
      border-radius: 6px; font-size: 1em; cursor: pointer;
    }
    .contact-form button:hover { background: #1e3629; }
    .github-link { text-align: center; margin-top: 20px; }
    .github-link a { color: #2a4a3a; text-decoration: none; font-size: 1em;
                     border-bottom: 1px solid #d4af74; }
    footer { text-align: center; padding: 30px; color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <header>
    <h1>Hayakawa Dev</h1>
    
  </header>
  <main>
    <h2>About</h2>
    <div class="about">
      
      <p>個人で趣味とClaude Codeの勉強を兼ねて、アプリ開発をしています。<br>アラサーのSIer勤務男性です。</p>
    </div>

    <h2>Apps</h2>
    <div class="app-card">
      <h3>TsunStack - 積読・読書ログ管理</h3>
      <p>バーコードスキャンで本を即登録。積読リストと読了リストをシンプルに管理できるAndroidアプリ。アカウント不要・完全オフライン対応。</p>
      <a href="/tsunstack/privacy">プライバシーポリシー &rarr;</a>
    </div>

    <h2>Contact</h2>
    <div class="contact-form">
      <form action="https://formspree.io/f/xwvwwwnd" method="POST">
        <label>お名前
          <input type="text" name="name" placeholder="山田 太郎" required>
        </label>
        <label>メールアドレス
          <input type="email" name="email" placeholder="your@email.com" required>
        </label>
        <label>メッセージ
          <textarea name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
        </label>
        <button type="submit">送信する</button>
      </form>
    </div>
    <div class="github-link">
      <a href="https://github.com/asagePasta">GitHub &rarr;</a>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 Hayakawa Dev</p>
  </footer>
</body>
</html>
